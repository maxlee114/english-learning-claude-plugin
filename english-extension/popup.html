<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Learning Helper</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      background: #111111;
      color: #e0e0e0;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #2a2a2a;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      font-size: 18px;
    }

    .header h1 {
      font-size: 13px;
      font-weight: 700;
      color: #ffffff;
    }

    .settings-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #555555;
      font-size: 16px;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s;
      line-height: 1;
    }

    .settings-btn:hover { color: #aaaaaa; }

    .page-info {
      padding: 10px 16px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      font-size: 11px;
      color: #555555;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .word-list {
      max-height: 360px;
      overflow-y: auto;
    }

    .word-item {
      padding: 12px 16px;
      border-bottom: 1px solid #1e1e1e;
    }

    .word-item:last-child { border-bottom: none; }

    .word-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 3px;
    }

    .word-text {
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
    }

    .word-pos {
      font-size: 11px;
      color: #555555;
      font-style: italic;
    }

    .word-definition {
      font-size: 13px;
      color: #888888;
      line-height: 1.4;
    }

    .empty-state {
      padding: 32px 16px;
      text-align: center;
      color: #444444;
      font-size: 12px;
      line-height: 1.6;
    }

    .loading {
      padding: 32px 16px;
      text-align: center;
      color: #444444;
      font-size: 12px;
    }

    .word-count {
      padding: 8px 16px;
      font-size: 10px;
      color: #444444;
      border-bottom: 1px solid #2a2a2a;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <span class="logo">📚</span>
      <h1>English Learning</h1>
    </div>
    <button class="settings-btn" id="settingsBtn" title="Settings">⚙️</button>
  </div>

  <div class="page-info" id="pageInfo">Loading...</div>

  <div id="content">
    <div class="loading">Loading words...</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
